    <style>
      html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      }

      .leaflet-popup-tip {
        display: none;
      }

      .leaflet-popup-content-wrapper {
      background: rgb(235,235,235);
      color: black;
      }

      .popup-title {
      font-family: "PT Serif", serif;
      font-size: 10pt;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      }

      .popup-grid {
      display: grid;
      grid-template-columns: 80px 1fr;
      column-gap: 6px;
      row-gap: 2px;
      font-family: "PT Sans", sans-serif;
      font-size: 9pt;
      text-align: justify;
      }

      .popup-grid .lbl {
      text-align: left;
      }

      .popup-grid .val {
      text-align: left;
      word-break: break-word;
      }

      .leaflet-popup-content {
      font-family: "PT Sans", sans-serif;
      max-height: 55vh;
      font-size: 9pt;
      line-height: 1.3;
      overflow-y: auto;
      }

      .toggle-btn {
      width: 44px;
      height: 44px;

      font-weight: 700;

      const newIcon = L.icon({
      iconUrl: icon.options.iconUrl,
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
      });
      return mjeriloOznake.call(this, newIcon);
      };

      map.eachLayer(function(layer) {

      }
